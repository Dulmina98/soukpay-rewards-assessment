version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: soukpay_db
    restart: always
    environment:
      POSTGRES_USER: soukpay
      POSTGRES_PASSWORD: soukpay123
      POSTGRES_DB: soukpay_rewards
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: