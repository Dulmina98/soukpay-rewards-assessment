version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: soukpay_db
    restart: always
    environment:
      POSTGRES_USER: soukpay
      POSTGRES_PASSWORD: soukpay123
      POSTGRES_DB: soukpay_rewards
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soukpay -d soukpay_rewards"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soukpay_backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://soukpay:soukpay123@postgres:5432/soukpay_rewards
      JWT_SECRET: your-super-secret-key-change-this
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: